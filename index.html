<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-color: #ff6b6b; /* Coral Red for TKIT */
            --secondary-color: #ee5a5a;
            --accent-color: #ffe3e3;
            --text-color: #333;
            --bg-color: #fff5f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            margin-top: 15px;
            font-size: 1.2rem;
            opacity: 0.95;
        }

        /* Navigation / Tabs */
        .nav-container {
            background-color: var(--white);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow-x: auto;
            white-space: nowrap;
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
        }

        .nav-btn {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 12px 25px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--primary-color);
            color: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.4);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }

        .class-section {
            display: none;
            animation: fadeIn 0.6s ease-in-out;
        }

        .class-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 2.5rem;
            font-size: 2.2rem;
            border-bottom: 4px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 8px;
        }

        .center-title {
            text-align: center;
        }

        /* Comparison Layout */
        .comparison-wrapper {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .month-card {
            flex: 1;
            min-width: 350px;
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
        }

        .month-card:hover {
            transform: translateY(-5px);
        }

        .month-header {
            color: var(--white);
            padding: 18px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .month-header.jan { 
            background: linear-gradient(135deg, #ff8e8e, #ff6b6b); 
        }
        .month-header.feb { 
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a); 
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--accent-color);
            color: var(--secondary-color);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #fff9f9;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .tahsin-col { 
            color: #d63031; 
            font-weight: 600; 
        }
        .tahfidz-col { 
            color: #00b894; 
            font-weight: 600; 
        }

        .note {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
            text-align: right;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .comparison-wrapper {
                flex-direction: column;
            }
            header h1 {
                font-size: 2rem;
            }
            .nav-container {
                text-align: left;
            }
            .month-card {
                min-width: 100%;
            }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background-color: var(--white);
            margin-top: 3rem;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>

    // Function to generate HTML
    function renderData() {
        const navContainer = document.getElementById('navContainer');
        const contentContainer = document.getElementById('contentContainer');

        // Generate Navigation
        schoolData.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            if (index === 0) btn.classList.add('active');
            btn.innerText = item.name;
            btn.onclick = () => switchTab(index);
            navContainer.appendChild(btn);
        });

        // Generate Content
        schoolData.forEach((item, index) => {
            const section = document.createElement('div');
            section.className = 'class-section';
            if (index === 0) section.classList.add('active');
            section.id = `section-${index}`;

            const title = document.createElement('div');
            title.className = 'center-title';
            title.innerHTML = `<h2 class="section-title">${item.name}</h2>`;
            section.appendChild(title);

            const wrapper = document.createElement('div');
            wrapper.className = 'comparison-wrapper';

            // January Card
            const janCard = createMonthCard("📅 BULAN JANUARI 2026", "jan", item.jan);
            wrapper.appendChild(janCard);

            // February Card
            const febCard = createMonthCard("📅 BULAN FEBRUARI 2026", "feb", item.feb);
            wrapper.appendChild(febCard);

            section.appendChild(wrapper);

            if(item.note) {
                const note = document.createElement('div');
                note.className = 'note';
                note.innerHTML = `📝 <strong>Catatan:</strong> ${item.note}`;
                section.appendChild(note);
            }

            contentContainer.appendChild(section);
        });
    }

    function createMonthCard(title, type, data) {
        const card = document.createElement('div');
        card.className = 'month-card';

        const header = document.createElement('div');
        header.className = `month-header ${type}`;
        header.innerText = title;
        card.appendChild(header);

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        thead.innerHTML = `
            <tr>
                <th style="width: 50px;">No</th>
                <th>Nama Siswa</th>
                <th style="width: 60px;">Kls</th>
                <th>Tahsin</th>
                <th>Tahfidz</th>
            </tr>
        `;
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        data.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${row.no}</td>
                <td><strong>${row.nama}</strong></td>
                <td>${row.kls}</td>
                <td class="tahsin-col">📖 ${row.tahsin}</td>
                <td class="tahfidz-col">🕌 ${row.tahfidz}</td>
            `;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        card.appendChild(table);

        return card;
    }

    function switchTab(index) {
        // Remove active class from all buttons and sections
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.class-section').forEach(sec => sec.classList.remove('active'));

        // Add active class to selected
        document.querySelectorAll('.nav-btn')[index].classList.add('active');
        document.getElementById(`section-${index}`).classList.add('active');
    }

    // Initialize
    renderData();
